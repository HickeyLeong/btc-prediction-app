<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BTC 猜涨跌 - Binance Events</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/3.9.1/chart.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: linear-gradient(135deg, #1e1e2e 0%, #2d2d44 100%);
            color: #ffffff;
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1600px;
            margin: 0 auto;
        }

        header {
            text-align: center;
            margin-bottom: 30px;
            background: rgba(0, 0, 0, 0.3);
            padding: 20px;
            border-radius: 10px;
            border-bottom: 2px solid #f7931a;
        }

        h1 {
            font-size: 32px;
            margin-bottom: 10px;
            color: #f7931a;
        }

        .header-info {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 40px;
            flex-wrap: wrap;
        }

        .info-box {
            text-align: center;
        }

        .info-label {
            font-size: 12px;
            color: #aaa;
            margin-bottom: 5px;
        }

        .info-value {
            font-size: 20px;
            font-weight: bold;
            color: #f7931a;
        }

        .main-content {
            display: grid;
            grid-template-columns: 1fr 380px;
            gap: 20px;
            margin-bottom: 30px;
        }

        @media (max-width: 1200px) {
            .main-content {
                grid-template-columns: 1fr;
            }
        }

        .chart-section {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 10px;
            padding: 20px;
            backdrop-filter: blur(10px);
        }

        .chart-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .chart-title {
            font-size: 18px;
            color: #f7931a;
            font-weight: 600;
        }

        .price-info {
            display: flex;
            gap: 20px;
            font-size: 14px;
        }

        .price-info-item {
            display: flex;
            flex-direction: column;
            gap: 5px;
        }

        .price-label {
            color: #aaa;
            font-size: 12px;
        }

        .price-value {
            color: #fff;
            font-weight: 600;
        }

        .chart-container {
            position: relative;
            height: 500px;
            margin-bottom: 20px;
        }

        .sidebar {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .card {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 10px;
            padding: 20px;
            backdrop-filter: blur(10px);
        }

        .card h2 {
            margin-bottom: 15px;
            font-size: 16px;
            color: #f7931a;
        }

        .form-group {
            margin-bottom: 15px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            font-size: 13px;
            color: #ccc;
        }

        input {
            width: 100%;
            padding: 10px;
            border: 1px solid #444;
            border-radius: 6px;
            background: #2d2d44;
            color: #fff;
            font-size: 13px;
        }

        input:focus {
            outline: none;
            border-color: #f7931a;
            box-shadow: 0 0 0 2px rgba(247, 147, 26, 0.2);
        }

        .duration-buttons {
            display: flex;
            gap: 8px;
            margin-bottom: 15px;
        }

        .duration-btn {
            flex: 1;
            padding: 10px;
            border: 1px solid #444;
            border-radius: 6px;
            background: #2d2d44;
            color: #ccc;
            cursor: pointer;
            transition: all 0.3s;
            font-weight: 600;
            font-size: 12px;
        }

        .duration-btn.active {
            background: #f7931a;
            color: #000;
            border-color: #f7931a;
        }

        .duration-btn:hover {
            border-color: #f7931a;
            color: #f7931a;
        }

        .bet-buttons {
            display: flex;
            gap: 10px;
            margin-top: 15px;
        }

        button {
            flex: 1;
            padding: 12px;
            border: none;
            border-radius: 6px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }

        .btn-up {
            background: linear-gradient(135deg, #4caf50, #45a049);
            color: #fff;
        }

        .btn-up:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(76, 175, 80, 0.4);
        }

        .btn-down {
            background: linear-gradient(135deg, #f44336, #da190b);
            color: #fff;
        }

        .btn-down:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(244, 67, 54, 0.4);
        }

        button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .stats-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin-bottom: 15px;
        }

        .stat-box {
            background: rgba(0, 0, 0, 0.2);
            border-radius: 6px;
            padding: 12px;
            text-align: center;
        }

        .stat-label {
            font-size: 11px;
            color: #aaa;
            margin-bottom: 5px;
        }

        .stat-value {
            font-size: 18px;
            font-weight: bold;
            color: #f7931a;
        }

        .bets-container {
            max-height: 400px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .bet-item {
            background: rgba(0, 0, 0, 0.2);
            border-left: 3px solid #f7931a;
            border-radius: 4px;
            padding: 12px;
            font-size: 12px;
        }

        .bet-item.win {
            border-left-color: #4caf50;
        }

        .bet-item.lose {
            border-left-color: #f44336;
        }

        .bet-header {
            display: flex;
            justify-content: space-between;
            margin-bottom: 8px;
            font-weight: 600;
        }

        .bet-direction {
            padding: 2px 6px;
            border-radius: 3px;
            font-size: 11px;
        }

        .bet-direction.up {
            background: rgba(76, 175, 80, 0.2);
            color: #4caf50;
        }

        .bet-direction.down {
            background: rgba(244, 67, 54, 0.2);
            color: #f44336;
        }

        .bet-status {
            padding: 2px 6px;
            border-radius: 3px;
            font-size: 11px;
            background: rgba(76, 175, 80, 0.2);
            color: #4caf50;
        }

        .bet-status.lose {
            background: rgba(244, 67, 54, 0.2);
            color: #f44336;
        }

        .bet-details {
            display: flex;
            justify-content: space-between;
            color: #aaa;
            margin-bottom: 5px;
        }

        .bet-amount {
            color: #f7931a;
            font-weight: 600;
        }

        .message {
            position: fixed;
            top: 20px;
            right: 20px;
            padding: 15px 25px;
            border-radius: 6px;
            display: none;
            z-index: 1000;
            animation: slideIn 0.3s ease-out;
        }

        .message.show {
            display: block;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateX(400px);
            }
            to {
                opacity: 1;
                transform: translateX(0);
            }
        }

        .message.success {
            background: rgba(76, 175, 80, 0.2);
            color: #4caf50;
            border: 1px solid rgba(76, 175, 80, 0.5);
        }

        .message.error {
            background: rgba(244, 67, 54, 0.2);
            color: #f44336;
            border: 1px solid rgba(244, 67, 54, 0.5);
        }

        .reset-btn {
            width: 100%;
            padding: 10px;
            background: #f7931a;
            color: #000;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 600;
            font-size: 13px;
        }

        ::-webkit-scrollbar {
            width: 6px;
        }

        ::-webkit-scrollbar-track {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 10px;
        }

        ::-webkit-scrollbar-thumb {
            background: rgba(247, 147, 26, 0.5);
            border-radius: 10px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: rgba(247, 147, 26, 0.8);
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>🚀 BTC 猜涨跌</h1>
            <div class="header-info">
                <div class="info-box">
                    <div class="info-label">当前余额</div>
                    <div class="info-value">$<span id="balance">100.00</span></div>
                </div>
                <div class="info-box">
                    <div class="info-label">总投注</div>
                    <div class="info-value"><span id="totalBets">0</span></div>
                </div>
                <div class="info-box">
                    <div class="info-label">胜场</div>
                    <div class="info-value" style="color: #4caf50;"><span id="wins">0</span></div>
                </div>
                <div class="info-box">
                    <div class="info-label">负场</div>
                    <div class="info-value" style="color: #f44336;"><span id="losses">0</span></div>
                </div>
            </div>
        </header>

        <div id="messageBox" class="message"></div>

        <div class="main-content">
            <!-- K线图部分 -->
            <div class="chart-section">
                <div class="chart-header">
                    <div class="chart-title">📊 BTC/USDT K线</div>
                    <div class="price-info">
                        <div class="price-info-item">
                            <span class="price-label">当前价</span>
                            <span class="price-value" id="currentPrice">--</span>
                        </div>
                        <div class="price-info-item">
                            <span class="price-label">变化</span>
                            <span class="price-value" id="priceChange">--</span>
                        </div>
                    </div>
                </div>
                <div class="chart-container">
                    <canvas id="priceChart"></canvas>
                </div>
            </div>

            <!-- 右侧下单面板 -->
            <div class="sidebar">
                <!-- 下单卡片 -->
                <div class="card">
                    <h2>📝 下单</h2>
                    <div class="form-group">
                        <label>下单金额</label>
                        <input type="number" id="betAmount" min="5" max="100" step="5" value="5">
                        <div style="font-size: 12px; color: #aaa; margin-top: 5px;">可用: $<span id="availableAmount">100.00</span></div>
                    </div>

                    <label style="display: block; margin-bottom: 8px; color: #ccc; font-size: 13px;">时间周期</label>
                    <div class="duration-buttons">
                        <button class="duration-btn active" data-duration="5">5分钟</button>
                        <button class="duration-btn" data-duration="10">10分钟</button>
                        <button class="duration-btn" data-duration="30">30分钟</button>
                    </div>

                    <div class="bet-buttons">
                        <button class="btn-up" id="btnUp">📈 UP</button>
                        <button class="btn-down" id="btnDown">📉 DOWN</button>
                    </div>
                </div>

                <!-- 统计卡片 -->
                <div class="card">
                    <h2>📈 统计</h2>
                    <div class="stats-row">
                        <div class="stat-box">
                            <div class="stat-label">胜率</div>
                            <div class="stat-value"><span id="winRate">0</span>%</div>
                        </div>
                        <div class="stat-box">
                            <div class="stat-label">收益</div>
                            <div class="stat-value" id="totalProfit" style="color: #4caf50;">$0</div>
                        </div>
                    </div>
                    <button class="reset-btn" onclick="resetData()">🔄 重置</button>
                </div>

                <!-- 投注历史 -->
                <div class="card">
                    <h2>📜 最近投注</h2>
                    <div class="bets-container" id="betsList"></div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const gameData = {
            balance: 100,
            totalBets: 0,
            wins: 0,
            losses: 0,
            bets: [],
            priceHistory: []
        };

        const INITIAL_BALANCE = 100;
        const MIN_BET = 5;
        const WIN_RATE = 0.8;
        const MAX_HISTORY = 60;

        let currentPrice = 0;
        let previousPrice = 0;
        let selectedDuration = 5;
        let chart = null;

        function loadData() {
            const saved = localStorage.getItem('btcGameData');
            if (saved) {
                Object.assign(gameData, JSON.parse(saved));
            }
            updateUI();
        }

        function saveData() {
            localStorage.setItem('btcGameData', JSON.stringify(gameData));
        }

        async function fetchBtcPrice() {
            try {
                const apis = [
                    'https://api.coingecko.com/api/v3/simple/price?ids=bitcoin&vs_currencies=usd',
                    'https://api.coinbase.com/v2/exchange-rates?currency=BTC'
                ];

                let price = null;

                for (const api of apis) {
                    try {
                        const response = await fetch(api);
                        if (!response.ok) continue;
                        
                        const data = await response.json();
                        
                        if (api.includes('coingecko')) {
                            price = parseFloat(data.bitcoin.usd);
                        } else if (api.includes('coinbase')) {
                            price = parseFloat(data.data.rates.USD);
                        }
                        
                        if (price) break;
                    } catch (e) {
                        continue;
                    }
                }

                if (price) {
                    previousPrice = currentPrice;
                    currentPrice = price;
                    
                    gameData.priceHistory.push({
                        time: new Date(),
                        price: price
                    });
                    
                    if (gameData.priceHistory.length > MAX_HISTORY) {
                        gameData.priceHistory.shift();
                    }
                    
                    updatePriceDisplay();
                    updateChart();
                }
            } catch (error) {
                console.error('获取价格失败:', error);
            }
        }

        function updatePriceDisplay() {
            document.getElementById('currentPrice').textContent = currentPrice.toFixed(2);
            
            const priceChangeEl = document.getElementById('priceChange');
            if (previousPrice && currentPrice > previousPrice) {
                const change = ((currentPrice - previousPrice) / previousPrice * 100).toFixed(2);
                priceChangeEl.textContent = `+${change}% 📈`;
                priceChangeEl.style.color = '#4caf50';
            } else if (previousPrice && currentPrice < previousPrice) {
                const change = ((previousPrice - currentPrice) / previousPrice * 100).toFixed(2);
                priceChangeEl.textContent = `-${change}% 📉`;
                priceChangeEl.style.color = '#f44336';
            }
        }

        function initChart() {
            const ctx = document.getElementById('priceChart').getContext('2d');
            chart = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: [],
                    datasets: [{
                        label: 'BTC价格',
                        data: [],
                        borderColor: '#f7931a',
                        backgroundColor: 'rgba(247, 147, 26, 0.1)',
                        tension: 0.4,
                        fill: true,
                        pointRadius: 3,
                        pointBackgroundColor: '#f7931a',
                        pointBorderColor: '#fff',
                        pointBorderWidth: 1
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: {
                        legend: {
                            display: false
                        }
                    },
                    scales: {
                        y: {
                            beginAtZero: false,
                            grid: {
                                color: 'rgba(255, 255, 255, 0.05)'
                            },
                            ticks: {
                                color: '#aaa',
                                font: {
                                    size: 12
                                }
                            }
                        },
                        x: {
                            grid: {
                                display: false
                            },
                            ticks: {
                                color: '#aaa',
                                font: {
                                    size: 12
                                },
                                maxRotation: 45,
                                minRotation: 0
                            }
                        }
                    }
                }
            });
        }

        function updateChart() {
            if (!chart) return;
            
            chart.data.labels = gameData.priceHistory.map(item => {
                const time = new Date(item.time);
                return time.toLocaleTimeString('zh-CN', { hour: '2-digit', minute: '2-digit', second: '2-digit' });
            });
            
            chart.data.datasets[0].data = gameData.priceHistory.map(item => item.price);
            chart.update('none');
        }

        function showMessage(text, type) {
            const box = document.getElementById('messageBox');
            box.textContent = text;
            box.className = `message ${type} show`;
            setTimeout(() => {
                box.classList.remove('show');
            }, 3000);
        }

        function placeBet(direction) {
            const amount = parseFloat(document.getElementById('betAmount').value);

            if (isNaN(amount) || amount < MIN_BET) {
                showMessage(`❌ 最小下单金额为 $${MIN_BET}`, 'error');
                return;
            }

            if (amount > gameData.balance) {
                showMessage('❌ 余额不足', 'error');
                return;
            }

            if (!currentPrice) {
                showMessage('⏳ 等待价格数据...', 'error');
                return;
            }

            gameData.balance -= amount;

            const bet = {
                id: Date.now(),
                amount: amount,
                direction: direction,
                duration: selectedDuration,
                entryPrice: currentPrice,
                entryTime: new Date(),
                status: 'open',
                settleTime: Date.now() + selectedDuration * 60000
            };

            gameData.bets.push(bet);
            saveData();

            showMessage(`✅ 已下单 ${direction} $${amount}，${selectedDuration} 分钟后结算`, 'success');

            document.getElementById('btnUp').disabled = true;
            document.getElementById('btnDown').disabled = true;

            setTimeout(() => {
                settleBet(bet.id);
            }, selectedDuration * 60000);

            updateUI();
        }

        function settleBet(betId) {
            const bet = gameData.bets.find(b => b.id === betId);
            if (!bet || bet.status !== 'open') return;

            const exitPrice = currentPrice;
            const isWin = (bet.direction === 'UP' && exitPrice > bet.entryPrice) ||
                         (bet.direction === 'DOWN' && exitPrice < bet.entryPrice);

            bet.exitPrice = exitPrice;
            bet.status = isWin ? 'win' : 'lose';
            bet.settleTime = new Date();

            if (isWin) {
                const profit = bet.amount * WIN_RATE;
                bet.profit = profit;
                gameData.balance += bet.amount + profit;
                gameData.wins++;
            } else {
                bet.profit = 0;
                gameData.losses++;
            }

            gameData.totalBets++;
            saveData();

            showMessage(
                isWin ? 
                `🎉 恭喜！${bet.direction} 赚了 $${(bet.amount * WIN_RATE).toFixed(2)}` :
                `😢 可惜了，${bet.direction} 亏了 $${bet.amount}`,
                isWin ? 'success' : 'error'
            );

            document.getElementById('btnUp').disabled = false;
            document.getElementById('btnDown').disabled = false;

            updateUI();
        }

        function updateUI() {
            document.getElementById('balance').textContent = gameData.balance.toFixed(2);
            document.getElementById('availableAmount').textContent = gameData.balance.toFixed(2);
            document.getElementById('totalBets').textContent = gameData.totalBets;
            document.getElementById('wins').textContent = gameData.wins;
            document.getElementById('losses').textContent = gameData.losses;

            const winRate = gameData.totalBets > 0 ? 
                Math.round((gameData.wins / gameData.totalBets) * 100) : 0;
            document.getElementById('winRate').textContent = winRate;

            const totalProfit = gameData.balance - INITIAL_BALANCE;
            const profitEl = document.getElementById('totalProfit');
            profitEl.textContent = (totalProfit >= 0 ? '+' : '') + totalProfit.toFixed(0);
            profitEl.style.color = totalProfit >= 0 ? '#4caf50' : '#f44336';

            updateBetsList();
        }

        function updateBetsList() {
            const container = document.getElementById('betsList');
            const closedBets = gameData.bets.filter(b => b.status !== 'open').reverse().slice(0, 8);

            if (closedBets.length === 0) {
                container.innerHTML = '<div style="color: #aaa; text-align: center; padding: 20px;">暂无投注记录</div>';
                return;
            }

            container.innerHTML = closedBets.map(bet => {
                const isWin = bet.status === 'win';
                return `
                    <div class="bet-item ${isWin ? 'win' : 'lose'}">
                        <div class="bet-header">
                            <span class="bet-direction ${bet.direction.toLowerCase()}">${bet.direction}</span>
                            <span class="bet-status ${isWin ? '' : 'lose'}">${isWin ? '✅ 赢' : '❌ 亏'}</span>
                        </div>
                        <div class="bet-details">
                            <span class="bet-amount">$${bet.amount}</span>
                            <span>${bet.entryPrice.toFixed(0)} → ${bet.exitPrice.toFixed(0)}</span>
                        </div>
                    </div>
                `;
            }).join('');
        }

        function resetData() {
            if (confirm('确定要重置所有数据吗？')) {
                gameData.balance = INITIAL_BALANCE;
                gameData.totalBets = 0;
                gameData.wins = 0;
                gameData.losses = 0;
                gameData.bets = [];
                saveData();
                updateUI();
                showMessage('✅ 数据已重置', 'success');
            }
        }

        document.getElementById('btnUp').addEventListener('click', () => placeBet('UP'));
        document.getElementById('btnDown').addEventListener('click', () => placeBet('DOWN'));

        document.querySelectorAll('.duration-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelectorAll('.duration-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                selectedDuration = parseInt(btn.dataset.duration);
            });
        });

        loadData();
        initChart();
        fetchBtcPrice();

        setInterval(fetchBtcPrice, 5000);

        setInterval(() => {
            const now = Date.now();
            gameData.bets.forEach(bet => {
                if (bet.status === 'open' && now >= bet.settleTime) {
                    settleBet(bet.id);
                }
            });
        }, 1000);

        window.addEventListener('beforeunload', saveData);
    </script>
</body>
</html>
